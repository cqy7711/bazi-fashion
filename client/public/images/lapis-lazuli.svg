<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 160">
  <defs>
    <!-- 青金石基底渐变 - 深蓝到更深蓝 -->
    <radialGradient id="lapisBase" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#4A7FD8"/>
      <stop offset="40%" stop-color="#1E4AA0"/>
      <stop offset="80%" stop-color="#0D2B5E"/>
      <stop offset="100%" stop-color="#051638"/>
    </radialGradient>
    
    <!-- 珠子表面高光 - 强烈的球面反光 -->
    <radialGradient id="lapisHighlight" cx="30%" cy="25%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="20%" stop-color="rgba(200,220,255,0.5)"/>
      <stop offset="50%" stop-color="rgba(100,150,200,0.2)"/>
      <stop offset="100%" stop-color="rgba(0,50,100,0)"/>
    </radialGradient>
    
    <!-- 边缘反光 -->
    <linearGradient id="lapisRim" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(150,180,220,0.6)"/>
      <stop offset="50%" stop-color="rgba(50,100,160,0.2)"/>
      <stop offset="100%" stop-color="rgba(10,30,60,0.8)"/>
    </linearGradient>
    
    <!-- 底部阴影 -->
    <radialGradient id="beadShadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.4)"/>
      <stop offset="70%" stop-color="rgba(0,0,0,0.1)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
    
    <!-- 单颗珠子定义 -->
    <g id="lapisBead">
      <!-- 底部阴影 -->
      <ellipse cx="0" cy="18" rx="16" ry="8" fill="url(#beadShadow)"/>
      
      <!-- 珠子主体 -->
      <circle cx="0" cy="0" r="18" fill="url(#lapisBase)"/>
      
      <!-- 青金石纹理层 - 方解石白色纹理 -->
      <g opacity="0.35">
        <path d="M-12,-8 Q-8,-4 -5,-9 T2,-6" stroke="#8AB4E8" stroke-width="1.5" fill="none" opacity="0.6"/>
        <path d="M8,5 Q12,8 14,3" stroke="#A0C4F0" stroke-width="1" fill="none" opacity="0.5"/>
        <ellipse cx="-6" cy="8" rx="4" ry="2" fill="#6B9FD8" opacity="0.4"/>
        <ellipse cx="10" cy="-5" rx="3" ry="5" fill="#5A8EC8" opacity="0.3"/>
        <path d="M-2,12 Q3,10 6,13" stroke="#9BBCE8" stroke-width="0.8" fill="none" opacity="0.5"/>
      </g>
      
      <!-- 黄铁矿金色斑点 - 星星状 -->
      <g>
        <!-- 金色小点 -->
        <circle cx="-8" cy="-6" r="1.2" fill="#C9A227" opacity="0.9"/>
        <circle cx="6" cy="8" r="0.8" fill="#D4AF37" opacity="0.85"/>
        <circle cx="-5" cy="10" r="1" fill="#B8960C" opacity="0.8"/>
        <circle cx="11" cy="-3" r="0.6" fill="#C9A227" opacity="0.9"/>
        <circle cx="-10" cy="3" r="0.7" fill="#D4AF37" opacity="0.85"/>
        <circle cx="3" cy="-11" r="0.9" fill="#B8960C" opacity="0.8"/>
        <circle cx="9" cy="5" r="0.5" fill="#C9A227" opacity="0.9"/>
        <circle cx="-3" cy="-2" r="0.6" fill="#D4AF37" opacity="0.75"/>
        <circle cx="-12" cy="-1" r="0.4" fill="#B8960C" opacity="0.8"/>
        <circle cx="5" cy="-5" r="0.7" fill="#C9A227" opacity="0.85"/>
        
        <!-- 闪光点效果 -->
        <circle cx="-8" cy="-6" r="0.4" fill="#FFF8DC" opacity="0.6"/>
        <circle cx="6" cy="8" r="0.25" fill="#FFF8DC" opacity="0.5"/>
      </g>
      
      <!-- 边缘轮廓/深度 -->
      <circle cx="0" cy="0" r="18" fill="none" stroke="url(#lapisRim)" stroke-width="1.5"/>
      
      <!-- 主高光 - 强烈的球面反光 -->
      <ellipse cx="-5" cy="-5" rx="10" ry="8" fill="url(#lapisHighlight)" opacity="0.9"/>
      
      <!-- 次高光/反光 -->
      <ellipse cx="8" cy="8" rx="5" ry="4" fill="rgba(200,220,255,0.3)"/>
      
      <!-- 珠孔 -->
      <circle cx="0" cy="0" r="3" fill="#0A1A3A"/>
      <circle cx="0" cy="0" r="2" fill="#051225"/>
    </g>
  </defs>
  
  <!-- 背景 -->
  <rect width="200" height="160" fill="#f8f9fa"/>
  
  <!-- 手串排列 - 17颗珠子 -->
  <!-- 后层珠子 (9颗) -->
  <use href="#lapisBead" x="45" y="55" transform="scale(0.92)"/>
  <use href="#lapisBead" x="70" y="42" transform="scale(0.92)"/>
  <use href="#lapisBead" x="100" y="38" transform="scale(0.92)"/>
  <use href="#lapisBead" x="130" y="42" transform="scale(0.92)"/>
  <use href="#lapisBead" x="155" y="55" transform="scale(0.92)"/>
  <use href="#lapisBead" x="165" y="78" transform="scale(0.92)"/>
  <use href="#lapisBead" x="155" y="102" transform="scale(0.92)"/>
  <use href="#lapisBead" x="130" y="115" transform="scale(0.92)"/>
  <use href="#lapisBead" x="100" y="120" transform="scale(0.92)"/>
  
  <!-- 前层珠子 (8颗) - 更大更突出 -->
  <use href="#lapisBead" x="35" y="78"/>
  <use href="#lapisBead" x="45" y="102"/>
  <use href="#lapisBead" x="70" y="115"/>
  <use href="#lapisBead" x="100" y="120"/>
</svg>