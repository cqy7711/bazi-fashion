<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <!-- 檀木球体 - 温润木色 -->
    <radialGradient id="woodSphere" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#A1887F"/>
      <stop offset="15%" stop-color="#8D6E63"/>
      <stop offset="35%" stop-color="#6D4C41"/>
      <stop offset="60%" stop-color="#4E342E"/>
      <stop offset="85%" stop-color="#3E2723"/>
      <stop offset="100%" stop-color="#2A1A14"/>
    </radialGradient>
    <!-- 木质哑光高光 -->
    <radialGradient id="woodSpecular" cx="30%" cy="25%" r="25%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- 木纹纹理 -->
    <filter id="woodGrain">
      <feTurbulence type="fractalNoise" baseFrequency="0.01 0.6" numOctaves="4" seed="35" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="500" height="350" fill="#F5F5F5"/>
  <ellipse cx="250" cy="260" rx="180" ry="35" fill="rgba(0,0,0,0.1)"/>

  <g id="woodBead">
    <ellipse cx="0" cy="42" rx="32" ry="10" fill="url(#shadow)"/>
    <circle r="35" fill="url(#woodSphere)"/>
    <circle r="33" fill="url(#woodSphere)" filter="url(#woodGrain)" opacity="0.5"/>
    <ellipse cx="-12" cy="-12" rx="14" ry="10" fill="url(#woodSpecular)"/>
    <ellipse cx="15" cy="8" rx="6" ry="4" fill="rgba(255,255,255,0.15)"/>
    <circle r="3" fill="#2A1A14"/>
  </g>

  <g transform="translate(250, 175)">
    <path d="M -160,-30 Q -180,0 -160,30" fill="none" stroke="#5D4037" stroke-width="3"/>
    <g transform="translate(-150, -20) scale(0.9)"><use href="#woodBead"/></g>
    <g transform="translate(-115, -45) scale(0.92)"><use href="#woodBead"/></g>
    <g transform="translate(-70, -60) scale(0.95)"><use href="#woodBead"/></g>
    <g transform="translate(-20, -68) scale(0.95)"><use href="#woodBead"/></g>
    <g transform="translate(30, -65) scale(0.95)"><use href="#woodBead"/></g>
    <g transform="translate(80, -55) scale(0.92)"><use href="#woodBead"/></g>
    <g transform="translate(125, -35) scale(0.9)"><use href="#woodBead"/></g>
    <g transform="translate(155, -5) scale(0.88)"><use href="#woodBead"/></g>
    <g transform="translate(160, 35) scale(0.85)"><use href="#woodBead"/></g>
  </g>

  <g transform="translate(250, 175)">
    <g transform="translate(140, 50)"><use href="#woodBead"/></g>
    <g transform="translate(100, 75)"><use href="#woodBead"/></g>
    <g transform="translate(55, 90)"><use href="#woodBead"/></g>
    <g transform="translate(5, 98)"><use href="#woodBead"/></g>
    <g transform="translate(-45, 95)"><use href="#woodBead"/></g>
    <g transform="translate(-90, 82)"><use href="#woodBead"/></g>
    <g transform="translate(-128, 60)"><use href="#woodBead"/></g>
    <g transform="translate(-155, 28)"><use href="#woodBead"/></g>
  </g>
</svg>
