<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350">
  <defs>
    <!-- 白水晶球体 - 透明冰感 -->
    <radialGradient id="crystalSphere" cx="35%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="20%" stop-color="#F5F5F5"/>
      <stop offset="45%" stop-color="#E0E0E0"/>
      <stop offset="70%" stop-color="#BDBDBD"/>
      <stop offset="90%" stop-color="#9E9E9E"/>
      <stop offset="100%" stop-color="#757575"/>
    </radialGradient>
    <!-- 水晶强光 -->
    <radialGradient id="crystalSpecular" cx="25%" cy="20%" r="30%">
      <stop offset="0%" stop-color="rgba(255,255,255,1)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.6)"/>
      <stop offset="60%" stop-color="rgba(255,255,255,0.2)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- 水晶彩虹折射 -->
    <radialGradient id="crystalRim" cx="50%" cy="50%" r="50%">
      <stop offset="75%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="90%" stop-color="rgba(200,220,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.5)"/>
    </radialGradient>
    <radialGradient id="shadow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(0,0,0,0.2)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>

  <rect width="500" height="350" fill="#F5F5F5"/>
  <ellipse cx="250" cy="260" rx="180" ry="35" fill="rgba(0,0,0,0.1)"/>

  <g id="crystalBead">
    <ellipse cx="0" cy="42" rx="32" ry="10" fill="url(#shadow)"/>
    <circle r="35" fill="url(#crystalSphere)"/>
    <circle r="35" fill="url(#crystalRim)"/>
    <!-- 主高光 -->
    <ellipse cx="-10" cy="-10" rx="16" ry="12" fill="url(#crystalSpecular)"/>
    <!-- 棱镜反光 -->
    <polygon points="-5,-5 5,-8 8,0 0,5 -6,2" fill="rgba(255,255,255,0.7)"/>
    <ellipse cx="18" cy="5" rx="5" ry="3" fill="rgba(255,255,255,0.5)"/>
    <circle r="3" fill="#616161"/>
  </g>

  <g transform="translate(250, 175)">
    <path d="M -160,-30 Q -180,0 -160,30" fill="none" stroke="#BDBDBD" stroke-width="3"/>
    <g transform="translate(-150, -20) scale(0.9)"><use href="#crystalBead"/></g>
    <g transform="translate(-115, -45) scale(0.92)"><use href="#crystalBead"/></g>
    <g transform="translate(-70, -60) scale(0.95)"><use href="#crystalBead"/></g>
    <g transform="translate(-20, -68) scale(0.95)"><use href="#crystalBead"/></g>
    <g transform="translate(30, -65) scale(0.95)"><use href="#crystalBead"/></g>
    <g transform="translate(80, -55) scale(0.92)"><use href="#crystalBead"/></g>
    <g transform="translate(125, -35) scale(0.9)"><use href="#crystalBead"/></g>
    <g transform="translate(155, -5) scale(0.88)"><use href="#crystalBead"/></g>
    <g transform="translate(160, 35) scale(0.85)"><use href="#crystalBead"/></g>
  </g>

  <g transform="translate(250, 175)">
    <g transform="translate(140, 50)"><use href="#crystalBead"/></g>
    <g transform="translate(100, 75)"><use href="#crystalBead"/></g>
    <g transform="translate(55, 90)"><use href="#crystalBead"/></g>
    <g transform="translate(5, 98)"><use href="#crystalBead"/></g>
    <g transform="translate(-45, 95)"><use href="#crystalBead"/></g>
    <g transform="translate(-90, 82)"><use href="#crystalBead"/></g>
    <g transform="translate(-128, 60)"><use href="#crystalBead"/></g>
    <g transform="translate(-155, 28)"><use href="#crystalBead"/></g>
  </g>
</svg>
