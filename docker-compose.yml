version: '3.8'

services:
  # 后端 API 服务
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: wuxing-server
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DB_PATH=/app/data/bazi.db
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
    volumes:
      - ./data:/app/data
      - ./server/src:/app/src:ro
    networks:
      - wuxing-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 前端 Web 服务
  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: wuxing-client
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://server:3001
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    networks:
      - wuxing-network

networks:
  wuxing-network:
    driver: bridge
